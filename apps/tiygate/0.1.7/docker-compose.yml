services:
  tiygate:
    image: jorbenzhu/tiygate:0.1.7
    container_name: ${CONTAINER_NAME}
    restart: always
    labels:
      createdBy: "Apps"
    ports:
      - "${PANEL_APP_PORT_HTTP}:3000"
    volumes:
      - ./data:/data
    environment:
      TIYGATE_LISTEN_ADDR: 0.0.0.0:3000
      TIYGATE_MODE: all
      TIYGATE_DATABASE_URL: sqlite:///data/tiygate.db?mode=rwc
      TIYGATE_ADMIN_TOKEN: ${TIYGATE_ADMIN_TOKEN}
      TIYGATE_MASTER_KEY: ${TIYGATE_MASTER_KEY}
      TIYGATE_REDIS_URL: ${TIYGATE_REDIS_URL}
      RUST_LOG: info
      TZ: Asia/Shanghai
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    stop_grace_period: 45s
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/readyz >/dev/null || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
