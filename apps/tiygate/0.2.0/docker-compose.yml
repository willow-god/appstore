services:
    tiygate:
        container_name: ${CONTAINER_NAME}
        deploy:
            resources:
                limits:
                    cpus: ${CPUS}
                    memory: ${MEMORY_LIMIT}
        environment:
            RUST_LOG: info
            TIYGATE_ADMIN_TOKEN: ${TIYGATE_ADMIN_TOKEN}
            TIYGATE_DATABASE_URL: sqlite://./data/tiygate.db?mode=rwc
            TIYGATE_LISTEN_ADDR: 0.0.0.0:3000
            TIYGATE_MASTER_KEY: ${TIYGATE_MASTER_KEY}
            TIYGATE_MODE: all
            TIYGATE_REDIS_URL: ${TIYGATE_REDIS_URL}
            TZ: Asia/Shanghai
        healthcheck:
            interval: 15s
            retries: 5
            start_period: 20s
            test:
                - CMD-SHELL
                - curl -fsS http://127.0.0.1:3000/readyz >/dev/null || exit 1
            timeout: 3s
        image: jorbenzhu/tiygate:0.2.0
        labels:
            createdBy: Apps
        networks:
            - 1panel-network
        ports:
            - ${HOST_IP}:${PANEL_APP_PORT_HTTP}:3000
        restart: always
        stop_grace_period: 45s
        ulimits:
            nofile:
                hard: 1048576
                soft: 1048576
        volumes:
            - ./data:/app/data
networks:
    1panel-network:
        external: true